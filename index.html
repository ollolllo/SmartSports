<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧体育 - 青蛙跳小游戏</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .navbar {
            background-color: #2c3e50;
            padding: 15px;
            margin-bottom: 30px;
        }
        .navbar ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .navbar li {
            display: inline;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .navbar a:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <ul>
            <li><a href="index.html">青蛙跳游戏</a></li>
            <li><a href="action-tracker.html">动作追踪</a></li>
            <li><a href="action-capture.html">动作捕捉</a></li>
            <li><a href="action-capture-mediapipe.html">动作捕捉 (MediaPipe)</a></li>
            <li><a href="game-treasure-catch.html">金元宝和石头游戏</a></li>
        </ul>
    </nav>
    <div class="game-container">
        <h1>智慧体育 - 青蛙跳小游戏</h1>
        
        <div class="game-section">
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="400"></canvas>
            </div>
            
            <div class="camera-section" style="position: relative; width: 400px; height: 300px;">
                <video id="cameraFeed" width="400" height="300" autoplay style="position: absolute; top: 0; left: 0; z-index: 1;"></video>
                <canvas id="cameraCanvas" width="400" height="300" style="position: absolute; top: 0; left: 0; z-index: 2;"></canvas>
            </div>
        </div>
        
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="timer">时间: <span id="timer">60</span>秒</div>
            <div class="status" id="status">准备开始</div>
        </div>
        
        <div class="gesture-display">
            <div class="gesture-label">当前手势:</div>
            <div class="gesture-status" id="gestureStatus">无法判断动作</div>
        </div>
        
        <div class="controls">
            <button id="startCameraBtn">启动摄像头</button>
            <button id="startBtn">开始游戏</button>
            <button id="resetBtn">重置游戏</button>
        </div>
        
        <div class="result" id="result" style="display: none;">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <p>动作准确率: <span id="accuracy">0</span>%</p>
            <button id="playAgainBtn">再玩一次</button>
        </div>
    </div>
    
    <script type="module" src="script.js"></script>
    <script>
        // 测试脚本，确保页面能够正常显示
        console.log('页面加载成功');
        window.addEventListener('error', function(e) {
            console.error('JavaScript错误:', e.error);
            document.getElementById('status').textContent = 'JavaScript错误: ' + e.error.message;
        });
    </script>
</body>
</html>
