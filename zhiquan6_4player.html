<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="landscape">
    <meta name="x5-orientation" content="landscape">
    <meta name="x5-fullscreen" content="true">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>金元宝和石头 - 4人版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script>
        // 表情图片对象
        const expressions = {
            default: "/imgs/1.png",
            happy: "/imgs/4.png",
            proud: "/imgs/5.png",
            crying: "/imgs/3.png"
        };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        /* 横屏适配 */
        @media screen and (orientation: portrait) {
            .game-container {
                min-height: 400px;
            }
            
            .player-area {
                height: 45vh;
            }
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            overflow: hidden;
        }
        
        .players-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 90vh;
            gap: 10px;
            padding: 10px;
        }
        
        .player-area {
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }
        
        .player-title {
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: bold;
            color: #333;
            background: rgba(255, 255, 255, 0.8);
            padding: 2px 10px;
            border-radius: 10px;
            z-index: 20;
        }

        .game-area {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            height: calc(100% - 30px);
        }

        .character {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 15%;
            max-width: 80px;
            height: 20%;
            max-height: 120px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: transparent;
            z-index: 10;
        }

        .object {
            position: absolute;
            width: 5%;
            max-width: 30px;
            height: 5%;
            max-height: 30px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 5;
        }

        .gold {
            background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=gold%20ingot%2C%20cartoon%20style%2C%20simple&image_size=square');
        }

        .stone {
            background-image: url('https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=stone%2C%20cartoon%20style%2C%20simple&image_size=square');
        }

        .弹幕 {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 20;
            animation: float-up 2s ease-out forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        .start-button {
            position: absolute;
            top: 10px;
            left: 10px;
            height: 40px;
            padding: 0 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999;
            min-width: 100px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            line-height: 40px;
        }

        .camera-container {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 150px;
            height: 112px;
            background: #000;
            border-radius: 5px;
            overflow: hidden;
            z-index: 20;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .action-display {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            z-index: 100;
        }

        .start-button:hover {
            background: #45a049;
        }

        /* 全屏按钮样式 */
        .fullscreen-button {
            position: absolute;
            top: 10px;
            left: 120px;
            height: 40px;
            padding: 0 15px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999;
            min-width: 100px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            line-height: 40px;
        }

        .fullscreen-button:hover {
            background: #1976D2;
        }

        /* 滑动图片样式 */
        .sliding-image {
            position: absolute;
            bottom: 20px;
            left: -50px;
            width: 40px;
            height: 60px;
            object-fit: contain;
            background-color: transparent;
            z-index: 10;
            transition: left 3s ease-in-out;
        }

        /* 确保在所有屏幕尺寸上都能正常显示 */
        @media (max-width: 1920px) {
            .start-button {
                font-size: 16px;
                padding: 0 16px;
            }
        }

        @media (max-width: 768px) {
            .start-button {
                font-size: 12px;
                padding: 0 10px;
                height: 30px;
                line-height: 30px;
            }
            
            .fullscreen-button {
                font-size: 12px;
                padding: 0 10px;
                height: 30px;
                line-height: 30px;
                left: 110px;
            }
            
            .action-display {
                font-size: 12px;
                padding: 4px 10px;
            }
            
            .camera-container {
                width: 100px;
                height: 75px;
            }
            
            .character {
                width: 20%;
                height: 25%;
            }
            
            .sliding-image {
                width: 30px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 24px; z-index: 9999;">金元宝和石头 - 4人版</h1>
        
        <div class="camera-container">
            <video id="camera" autoplay playsinline></video>
        </div>
        
        <div id="action-display" class="action-display">等待识别...</div>
        
        <!-- 退出全屏按钮 -->
        <button id="fullscreen-button" class="fullscreen-button">退出全屏</button>
        
        <div class="players-container">
            <!-- 玩家1 -->
            <div class="player-area">
                <div class="player-title">玩家1</div>
                <div class="game-area" id="game-area-1">
                    <div class="character" id="character-1">
                        <img id="expression-image-1" src="" alt="表情" style="width: 100%; height: 100%; object-fit: contain; background-color: transparent;">
                    </div>
                    <!-- 滑动图片 -->
                    <img id="sliding-image-1" src="/imgs/6.png" alt="滑动图片" class="sliding-image">
                </div>
            </div>
            
            <!-- 玩家2 -->
            <div class="player-area">
                <div class="player-title">玩家2</div>
                <div class="game-area" id="game-area-2">
                    <div class="character" id="character-2">
                        <img id="expression-image-2" src="" alt="表情" style="width: 100%; height: 100%; object-fit: contain; background-color: transparent;">
                    </div>
                    <!-- 滑动图片 -->
                    <img id="sliding-image-2" src="/imgs/6.png" alt="滑动图片" class="sliding-image">
                </div>
            </div>
            
            <!-- 玩家3 -->
            <div class="player-area">
                <div class="player-title">玩家3</div>
                <div class="game-area" id="game-area-3">
                    <div class="character" id="character-3">
                        <img id="expression-image-3" src="" alt="表情" style="width: 100%; height: 100%; object-fit: contain; background-color: transparent;">
                    </div>
                    <!-- 滑动图片 -->
                    <img id="sliding-image-3" src="/imgs/6.png" alt="滑动图片" class="sliding-image">
                </div>
            </div>
            
            <!-- 玩家4 -->
            <div class="player-area">
                <div class="player-title">玩家4</div>
                <div class="game-area" id="game-area-4">
                    <div class="character" id="character-4">
                        <img id="expression-image-4" src="" alt="表情" style="width: 100%; height: 100%; object-fit: contain; background-color: transparent;">
                    </div>
                    <!-- 滑动图片 -->
                    <img id="sliding-image-4" src="/imgs/6.png" alt="滑动图片" class="sliding-image">
                </div>
            </div>
        </div>
        
        <button class="start-button" id="start-button">开始游戏</button>
    </div>

    <script>
        // 游戏状态
        let gameRunning = false;
        let players = [];
        let currentAction = "";
        let isUsingMockData = false;
        
        // 游戏参数
        const startButton = document.getElementById('start-button');
        
        // 动作识别相关
        let actionCapture = null;
        
        // 玩家数据结构
        function createPlayer(id) {
            return {
                id: id,
                gameArea: document.getElementById(`game-area-${id}`),
                character: document.getElementById(`character-${id}`),
                expressionImage: document.getElementById(`expression-image-${id}`),
                slidingImage: document.getElementById(`sliding-image-${id}`),
                objects: [],
                isSlidingImageVisible: false,
                isSlidingPaused: false,
                isObjectsPaused: false,
                isJumpDisabled: false,
                slidingImagePauseTimer: null,
                isInProximity: false
            };
        }
        
        // 初始化滑动效果
        function initSliding() {
            players.forEach(player => {
                const slidingImage = player.slidingImage;
                if (!slidingImage) return;
                
                const gameArea = player.gameArea;
                const expressionImage = player.expressionImage;
                const originalImageSrc = expressionImage ? expressionImage.src : '';
                let isSwitched = false;
                let slidingStarted = false;
                let isInProximity = false;
                
                // 检查滑动图片是否在屏幕上
                function checkSlidingImageVisible() {
                    if (!slidingImage) return;
                    
                    const slidingRect = slidingImage.getBoundingClientRect();
                    const gameAreaRect = gameArea.getBoundingClientRect();
                    
                    // 检查滑动图片是否在游戏区域内
                    const isVisible = !(slidingRect.right < gameAreaRect.left || 
                                       slidingRect.left > gameAreaRect.right);
                    
                    // 更新玩家标志
                    player.isSlidingImageVisible = isVisible;
                }
                
                // 计算滑动图片与表情区域的水平距离
                function calculateDistance() {
                    if (!slidingImage || !player.character) return 9999;
                    
                    const slidingRect = slidingImage.getBoundingClientRect();
                    const characterRect = player.character.getBoundingClientRect();
                    
                    // 计算水平距离
                    const slidingCenterX = slidingRect.left + slidingRect.width / 2;
                    const characterCenterX = characterRect.left + characterRect.width / 2;
                    
                    return Math.abs(slidingCenterX - characterCenterX);
                }
                
                // 检查表情区域正上方范围内是否有物体
                function hasObjectsInProximity() {
                    if (!player.character) return false;
                    
                    const characterRect = player.character.getBoundingClientRect();
                    const gameAreaRect = gameArea.getBoundingClientRect();
                    const characterTop = characterRect.top - gameAreaRect.top;
                    
                    // 检查正上方不超过130像素距离的区域是否有物体
                    const proximityTop = characterTop - 130;
                    
                    return player.objects.some(obj => {
                        return obj.y >= proximityTop && obj.y <= characterTop;
                    });
                }
                
                // 检查所有物体是否都已落下
                function allObjectsFallen() {
                    if (!player.character) return true;
                    
                    const characterRect = player.character.getBoundingClientRect();
                    const gameAreaRect = gameArea.getBoundingClientRect();
                    const characterTop = characterRect.top - gameAreaRect.top;
                    
                    // 检查正上方130像素内的物体是否全部落下
                    const proximityTop = characterTop - 130;
                    
                    return !player.objects.some(obj => {
                        return obj.y >= proximityTop && obj.y <= characterTop;
                    });
                }
                
                // 处理接近逻辑
                function handleProximity() {
                    const distance = calculateDistance();
                    
                    // 检查是否进入接近范围（水平距离少于220像素）
                    if (distance < 220 && !isInProximity) {
                        isInProximity = true;
                        player.isInProximity = true;
                        
                        // 检查表情区域正上方范围内是否有物体
                        if (hasObjectsInProximity()) {
                            // 情况A：有物体在范围内
                            // 暂停滑动，但保持图片可见
                            player.isSlidingPaused = true;
                            // 禁用跳跃响应
                            player.isJumpDisabled = true;
                            
                            // 定期检查物体是否全部落下
                            const checkObjectsInterval = setInterval(() => {
                                if (allObjectsFallen()) {
                                    clearInterval(checkObjectsInterval);
                                    // 恢复正常状态
                                    player.isSlidingPaused = false;
                                    player.isJumpDisabled = false;
                                    isInProximity = false;
                                    player.isInProximity = false;
                                    // 恢复滑动，让图片从当前位置继续滑动到屏幕右侧外
                                    const targetPosition = gameArea.offsetWidth + (gameArea.offsetWidth * 0.1);
                                    // 计算剩余滑动距离
                                    const currentLeft = parseFloat(slidingImage.style.left) || 0;
                                    const remainingDistance = targetPosition - currentLeft;
                                    // 使用与初始滑动相同的速度范围（80-120像素/秒）
                                    const speed = Math.random() * 40 + 80;
                                    // 根据剩余距离和速度计算过渡时间
                                    const transitionTime = remainingDistance / speed;
                                    slidingImage.style.transition = `left ${transitionTime}s linear`;
                                    slidingImage.style.left = targetPosition + 'px';
                                }
                            }, 100);
                        } else {
                            // 情况B：没有物体在范围内
                            // 正上方的石头和金元宝都暂停落下
                            player.isObjectsPaused = true;
                            // 继续正常滑动
                        }
                    } else if (distance > 100) {
                        // 滑动图片离开角色区域的水平距离超过100像素，恢复物体正常落下
                        isInProximity = false;
                        player.isInProximity = false;
                        player.isObjectsPaused = false;
                    }
                }
                
                // 碰撞检测函数
                function checkCollision() {
                    if (!slidingImage || !expressionImage) return;
                    
                    // 检查角色是否在跳跃，如果是则不进行碰撞检测
                    if (player.character && player.character.classList.contains('jumping')) {
                        return;
                    }
                    
                    const slidingRect = slidingImage.getBoundingClientRect();
                    const expressionRect = expressionImage.getBoundingClientRect();
                    
                    // 检测两个元素是否相交
                    const isColliding = !(slidingRect.right < expressionRect.left || 
                                         slidingRect.left > expressionRect.right || 
                                         slidingRect.bottom < expressionRect.top || 
                                         slidingRect.top > expressionRect.bottom);
                    
                    if (isColliding && !isSwitched) {
                        // 切换到2.png
                        expressionImage.src = '/imgs/2.png';
                        isSwitched = true;
                        
                        // 2秒后恢复默认图片
                        setTimeout(() => {
                            expressionImage.src = originalImageSrc;
                            isSwitched = false;
                        }, 2000);
                    }
                }
                
                // 滑动函数
                function slideIn() {
                    // 只有在游戏运行时才执行滑动
                    if (!gameRunning) {
                        // 如果游戏未开始，延迟检查
                        setTimeout(slideIn, 500);
                        return;
                    }
                    
                    // 重置位置到左侧屏幕外
                    slidingImage.style.transition = 'none';
                    slidingImage.style.left = '-50px';
                    isSwitched = false;
                    player.isSlidingImageVisible = false;
                    isInProximity = false;
                    
                    // 强制重排
                    slidingImage.offsetHeight;
                    
                    // 计算滑动到右侧屏幕外的位置
                    const targetPosition = gameArea.offsetWidth + 50;
                    // 计算滑动距离（像素）
                    const slideDistance = targetPosition + 50;
                    
                    // 生成80-120像素/秒之间的随机速度
                    const speed = Math.random() * 40 + 80;
                    // 根据距离和速度计算过渡时间
                    const transitionTime = slideDistance / speed;
                    
                    // 开始滑动
                    slidingImage.style.transition = `left ${transitionTime}s linear`;
                    slidingImage.style.left = targetPosition + 'px';
                    
                    // 定期检查碰撞、滑动图片可见性和距离
                    const checkInterval = setInterval(() => {
                        if (!player.isSlidingPaused) {
                            checkCollision();
                            checkSlidingImageVisible();
                            handleProximity();
                        }
                    }, 50);
                    
                    // 滑动完成后，随机延迟后再次滑动
                    slidingImage.addEventListener('transitionend', function onTransitionEnd() {
                        slidingImage.removeEventListener('transitionend', onTransitionEnd);
                        clearInterval(checkInterval);
                        
                        // 随机延迟3-8秒后再次滑动
                        const delay = Math.random() * 5000 + 3000;
                        setTimeout(slideIn, delay);
                    });
                }
                
                // 开始第一次滑动
                setTimeout(slideIn, 1000);
            });
        }
        
        // 初始化游戏
        function initGame() {
            // 创建4个玩家
            for (let i = 1; i <= 4; i++) {
                players.push(createPlayer(i));
            }
            
            startButton.addEventListener('click', toggleGame);
            
            // 初始化默认表情
            players.forEach(player => {
                if (player.expressionImage) {
                    player.expressionImage.src = expressions.default;
                    player.character.style.backgroundColor = "transparent";
                }
            });
            
            // 初始化动作捕捉
            actionCapture = new ActionCapture();
            
            // 初始化滑动图片
            initSliding();
        }
        
        // 模拟动作数据
        function startMockActionData() {
            isUsingMockData = true;
            console.log('开始使用模拟动作数据');
            
            const actions = ['站立', '举起双手', '双手抱头', '举起右手', '跳起来'];
            let currentIndex = 0;
            
            setInterval(() => {
                currentAction = actions[currentIndex];
                currentIndex = (currentIndex + 1) % actions.length;
                console.log('模拟动作:', currentAction);
                
                // 更新动作显示
                const actionDisplay = document.getElementById('action-display');
                if (actionDisplay) {
                    actionDisplay.textContent = currentAction;
                }
            }, 3000);
        }
        
        class ActionCapture {
            constructor() {
                this.videoElement = document.getElementById('camera');
                this.actionDisplay = document.getElementById('action-display');
                
                this.isCameraStarted = false;
                this.isRecognizing = false;
                this.pose = null;
                this.camera = null;
                
                // 头部位置历史，用于检测摇头动作
                this.headPositionHistory = [];
                this.maxHeadHistoryPoints = 20;
                // 垂直位置历史，用于检测跳跃动作
                this.verticalPositionHistory = [];
                this.maxVerticalHistoryPoints = 30;
                
                // 跳跃检测相关变量
                this.baselineHipY = null;
                this.baselineSetTime = 0;
                this.lastKneeY = null;
                this.jumpDetected = false;
                this.jumpStartTime = 0;
                this.hipYHistory = [];

                this.init();
            }

            init() {
                this.setupCamera();
            }

            async setupCamera() {
                if (this.isCameraStarted) return;

                try {
                    console.log('开始设置摄像头');
                    this.actionDisplay.textContent = '正在设置摄像头...';

                    // 检查navigator.mediaDevices是否可用
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('浏览器不支持摄像头访问');
                    }

                    // 尝试获取摄像头设备列表
                    console.log('正在获取摄像头设备列表');
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const videoDevices = devices.filter(device => device.kind === 'videoinput');
                    console.log('找到的摄像头设备:', videoDevices);

                    if (videoDevices.length === 0) {
                        throw new Error('未找到摄像头设备');
                    }

                    // 先获取摄像头流，确保摄像头可以访问
                    console.log('正在请求摄像头权限');
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: 640,
                            height: 480,
                            deviceId: videoDevices[0].deviceId
                        },
                        audio: false
                    });
                    console.log('摄像头权限获取成功');

                    // 设置视频源
                    this.videoElement.srcObject = stream;
                    console.log('视频源设置成功');

                    // 当视频元数据加载完成后开始播放
                    this.videoElement.onloadedmetadata = async () => {
                        try {
                            console.log('视频元数据加载完成，开始播放');
                            await this.videoElement.play();
                            console.log('视频播放成功');
                            this.actionDisplay.textContent = '摄像头已就绪';

                            // 初始化MediaPipe Pose
                            console.log('开始初始化MediaPipe Pose');
                            this.pose = new Pose({
                                locateFile: (file) => {
                                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                                }
                            });

                            this.pose.setOptions({
                                modelComplexity: 1,
                                smoothLandmarks: true,
                                enableSegmentation: false,
                                smoothSegmentation: false,
                                minDetectionConfidence: 0.5,
                                minTrackingConfidence: 0.5
                            });

                            this.pose.onResults((results) => this.onPoseResults(results));

                            // 等待模型加载
                            await this.pose.initialize();
                            console.log('MediaPipe Pose初始化成功');

                            this.isCameraStarted = true;
                            this.isRecognizing = true;
                            
                            // 开始处理每一帧
                            const processFrame = async () => {
                                if (this.isRecognizing && this.videoElement.readyState === 4) {
                                    await this.pose.send({image: this.videoElement});
                                }
                                requestAnimationFrame(processFrame);
                            };
                            processFrame();
                            console.log('开始处理视频帧');

                        } catch (playError) {
                            console.error('视频播放失败:', playError);
                            this.actionDisplay.textContent = '视频播放失败';
                        }
                    };

                    // 处理视频错误
                    this.videoElement.onerror = (error) => {
                        console.error('视频元素错误:', error);
                        this.actionDisplay.textContent = '视频元素错误';
                    };
                    
                } catch (error) {
                    console.error('设置失败:', error);
                    this.actionDisplay.textContent = '摄像头访问失败: ' + error.message + '，使用模拟数据';
                    // 即使摄像头失败，也让游戏可以运行
                    this.isCameraStarted = false;
                    this.isRecognizing = false;
                    // 启动模拟动作数据
                    startMockActionData();
                }
            }

            onPoseResults(results) {
                if (results.poseLandmarks) {
                    // 对于多人检测，这里会有多个poseLandmarks
                    // 但当前版本的MediaPipe Pose只返回一个人
                    // 实际多人检测需要使用其他方法
                    
                    // 更新头部位置历史
                    this.updateHeadPositionHistory(results.poseLandmarks);
                    // 更新垂直位置历史
                    this.updateVerticalPositionHistory(results.poseLandmarks);
                    
                    this.recognizeAction(results.poseLandmarks);
                }
            }

            updateHeadPositionHistory(landmarks) {
                const nose = landmarks[0];
                if (nose) {
                    this.headPositionHistory.push({
                        x: nose.x,
                        y: nose.y,
                        timestamp: Date.now()
                    });

                    // 保持历史记录在合理范围内
                    if (this.headPositionHistory.length > this.maxHeadHistoryPoints) {
                        this.headPositionHistory.shift();
                    }
                }
            }

            updateVerticalPositionHistory(landmarks) {
                const nose = landmarks[0];
                if (nose) {
                    this.verticalPositionHistory.push({
                        y: nose.y,
                        timestamp: Date.now()
                    });

                    // 保持历史记录在合理范围内
                    if (this.verticalPositionHistory.length > this.maxVerticalHistoryPoints) {
                        this.verticalPositionHistory.shift();
                    }
                }
            }

            detectHeadShake() {
                if (this.headPositionHistory.length < 10) {
                    return false;
                }

                const xValues = this.headPositionHistory.map(pos => pos.x);
                const minX = Math.min(...xValues);
                const maxX = Math.max(...xValues);
                const xRange = maxX - minX;

                let directionChanges = 0;
                let lastDirection = null;

                for (let i = 1; i < this.headPositionHistory.length; i++) {
                    const currentX = this.headPositionHistory[i].x;
                    const previousX = this.headPositionHistory[i-1].x;
                    const direction = currentX > previousX ? 'right' : 'left';

                    if (lastDirection && direction !== lastDirection) {
                        directionChanges++;
                    }
                    lastDirection = direction;
                }

                const recentHistory = this.headPositionHistory.filter(pos => 
                    Date.now() - pos.timestamp < 2000
                );

                return xRange > 0.1 && 
                       directionChanges >= 3 && 
                       recentHistory.length >= 8;
            }

            detectJump(landmarks) {
                // 简化的跳跃检测
                const nose = landmarks[0];
                const leftHip = landmarks[23];
                const rightHip = landmarks[24];
                
                if (!nose || !leftHip || !rightHip) {
                    return false;
                }
                
                // 检查跳跃状态是否超时（超过2秒就强制结束）
                if (this.jumpStartTime && Date.now() - this.jumpStartTime > 2000) {
                    this.jumpStartTime = null;
                    return false;
                }
                
                // 跳跃时身体会上升，髋部位置会升高
                const hipY = (leftHip.y + rightHip.y) / 2;
                const isJumping = hipY < 0.4; // 髋部位置明显升高
                
                // 如果检测到跳跃，记录开始时间
                if (isJumping && !this.jumpStartTime) {
                    this.jumpStartTime = Date.now();
                }
                
                return isJumping;
            }

            recognizeAction(landmarks) {
                // 获取关键点
                const leftShoulder = landmarks[11];
                const rightShoulder = landmarks[12];
                const leftWrist = landmarks[15];
                const rightWrist = landmarks[16];
                const nose = landmarks[0];

                // 只需要核心点
                if (!leftShoulder || !rightShoulder || !leftWrist || !rightWrist || !nose) {
                    currentAction = "未检测到完整姿态";
                    this.updateActionDisplay();
                    return;
                }

                // 计算距离的辅助函数
                const calculateDistance = (point1, point2) => {
                    return Math.sqrt(Math.pow(point1.x - point2.x, 2) + Math.pow(point1.y - point2.y, 2));
                };

                // 计算肩膀宽度（用于动态阈值）
                const shoulderWidth = Math.abs(leftShoulder.x - rightShoulder.x);
                const armRaisedThreshold = Math.max(0.1, shoulderWidth * 0.3);

                // 判断手臂是否抬起（手腕Y坐标小于肩膀Y坐标表示抬起）
                // 注意：MediaPipe的Y坐标是归一化的，0在顶部，1在底部
                const leftArmRaised = leftShoulder.y - leftWrist.y > armRaisedThreshold;
                const rightArmRaised = rightShoulder.y - rightWrist.y > armRaisedThreshold;

                // 先检测手臂动作（优先级高于跳跃）
                const leftWristToNose = calculateDistance(leftWrist, nose);
                const rightWristToNose = calculateDistance(rightWrist, nose);
                const isHandsOnHead = leftWristToNose < 0.3 && rightWristToNose < 0.3;
                const isBothHandsRaised = leftArmRaised && rightArmRaised;
                const isRightHandRaised = rightArmRaised && !leftArmRaised;

                // 检测动作
                let detectedAction = '站立';

                // 优先级顺序：举起右手 > 双手抱头 > 举起双手 > 跳起来
                // 1. 举起右手（优先级最高）
                if (isRightHandRaised) {
                    detectedAction = '举起右手';
                }
                // 2. 双手抱头
                else if (isHandsOnHead) {
                    detectedAction = '双手抱头';
                }
                // 3. 举起双手
                else if (isBothHandsRaised) {
                    detectedAction = '举起双手';
                }
                // 4. 跳跃（只有在没有手臂动作时才检测）
                else if (this.detectJump(landmarks)) {
                    detectedAction = '跳起来';
                }

                currentAction = detectedAction;
                this.updateActionDisplay();

                // 处理跳起来动作
                if (detectedAction === '跳起来') {
                    players.forEach(player => {
                        if (!player.isJumpDisabled) {
                            const character = player.character;
                            // 检查是否正在跳跃或冷却中
                            if (character && !character.classList.contains('jumping') && !character.classList.contains('jump-cooling')) {
                                character.classList.add('jumping');
                                // 向上移动120像素
                                character.style.transform = 'translateX(-50%) translateY(-120px)';
                                // 2秒后回到原来位置，并进入冷却期
                                setTimeout(() => {
                                    character.style.transform = 'translateX(-50%)';
                                    character.classList.remove('jumping');
                                    // 添加冷却标记，防止立即再次触发
                                    character.classList.add('jump-cooling');
                                    // 冷却期结束后移除冷却标记
                                    setTimeout(() => {
                                        character.classList.remove('jump-cooling');
                                    }, 2000); // 2秒冷却期
                                }, 2000);
                            }
                        }
                    });
                }

                // 游戏未开始时，检测举起右手自动开始游戏
                if (!gameRunning) {
                    // 只有检测到"举起右手"动作时才开始游戏
                    if (detectedAction === '举起右手') {
                        toggleGame();
                    }
                }
            }

            updateActionDisplay() {
                if (this.actionDisplay) {
                    this.actionDisplay.textContent = currentAction;
                }
            }
        }
        
        // 切换游戏状态
        function toggleGame() {
            gameRunning = !gameRunning;
            
            if (gameRunning) {
                startButton.textContent = "停止游戏";
                startButton.style.background = "#f44336";
                startGame();
            } else {
                startButton.textContent = "开始游戏";
                startButton.style.background = "#4CAF50";
                stopGame();
            }
        }
        
        // 开始游戏
        function startGame() {
            // 清空所有物体
            players.forEach(player => {
                player.objects = [];
            });
            
            gameLoop();
            
            // 游戏开始时为每个玩家生成第一个物体
            players.forEach(player => {
                spawnObjects(player);
            });
        }
        
        // 停止游戏
        function stopGame() {
            // 清空所有物体
            players.forEach(player => {
                player.objects.forEach(obj => {
                    if (obj.element) {
                        player.gameArea.removeChild(obj.element);
                    }
                });
                player.objects = [];
            });
        }
        
        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;
            
            // 更新每个玩家的物体位置
            players.forEach(player => {
                updateObjects(player);
                checkCollisions(player);
            });
            
            requestAnimationFrame(gameLoop);
        }
        
        // 生成物体
        function spawnObjects(player) {
            if (!gameRunning) return;
            
            // 获取角色位置，确保物体落在角色头上
            const characterRect = player.character.getBoundingClientRect();
            const gameAreaRect = player.gameArea.getBoundingClientRect();
            const characterCenterX = characterRect.left - gameAreaRect.left + characterRect.width / 2;
            
            // 计算相对单位（基于游戏区域高度的1%）
            const relativeUnit = player.gameArea.offsetHeight * 0.01;
            
            // 随机在角色头部区域生成物体（使用相对单位）
            const horizontalRange = relativeUnit * 6;
            const object = {
                type: Math.random() > 0.5 ? 'gold' : 'stone',
                x: characterCenterX + (Math.random() * horizontalRange - horizontalRange / 2), // 在角色头部左右范围内
                y: -relativeUnit * 4, // 从屏幕顶部上方开始
                speed: Math.random() * relativeUnit * 0.6 + relativeUnit * 0.6, // 速度使用相对单位
                originalSpeed: 0, // 保存原始速度
                element: null
            };
            
            // 保存原始速度
            object.originalSpeed = object.speed;
            
            // 如果滑动图片在屏幕上，新物体的速度再减慢一倍
            if (player.isSlidingImageVisible) {
                object.speed = object.originalSpeed / 2;
            }
            
            // 确保物体在游戏区域内
            const objectSize = relativeUnit * 3;
            if (object.x < 0) object.x = 0;
            if (object.x > player.gameArea.offsetWidth - objectSize) object.x = player.gameArea.offsetWidth - objectSize;
            
            // 创建物体元素
            const objElement = document.createElement('div');
            objElement.className = `object ${object.type}`;
            objElement.style.left = `${object.x}px`;
            objElement.style.top = `${object.y}px`;
            player.gameArea.appendChild(objElement);
            
            object.element = objElement;
            player.objects.push(object);
        }
        
        // 检查并生成下一个物体
        function checkAndSpawnNextObject(player) {
            if (!gameRunning) return;
            
            // 当没有物体时，生成新物体
            if (player.objects.length === 0) {
                // 随机0-2秒的间隔
                const delay = Math.random() * 2000;
                setTimeout(() => {
                    spawnObjects(player);
                }, delay);
            }
        }
        
        // 更新物体位置
        function updateObjects(player) {
            if (!player.character) return;
            
            const characterRect = player.character.getBoundingClientRect();
            const gameAreaRect = player.gameArea.getBoundingClientRect();
            const characterTop = characterRect.top - gameAreaRect.top;
            
            // 计算130像素的相对单位
            const relativeUnit = player.gameArea.offsetHeight * 0.01;
            const proximityTop = characterTop - 130; // 130像素
            
            player.objects.forEach((obj, index) => {
                // 根据滑动图片状态和物体位置调整速度
                if (player.isSlidingImageVisible) {
                    // 滑动图片在屏幕上时，速度再减慢一倍
                    obj.speed = obj.originalSpeed / 2;
                } else {
                    // 滑动图片离开屏幕后，恢复原始速度
                    obj.speed = obj.originalSpeed;
                }
                
                // 当物体暂停标志为true时，所有物体都停止落下
                if (player.isObjectsPaused) {
                    obj.speed = 0;
                } else if (player.isInProximity) {
                    // 当滑动图片在接近范围内时，控制物体下落
                    // 超过130像素上方的物体停止落下
                    if (obj.y < proximityTop) {
                        obj.speed = 0;
                    } else {
                        // 130像素内的物体继续落下
                        obj.speed = obj.originalSpeed / 2;
                    }
                }
                
                obj.y += obj.speed;
                obj.element.style.top = `${obj.y}px`;
                
                // 移除超出屏幕的物体
                if (obj.y > player.gameArea.offsetHeight) {
                    player.gameArea.removeChild(obj.element);
                    player.objects.splice(index, 1);
                    
                    // 检查是否需要生成下一个物体
                    checkAndSpawnNextObject(player);
                }
            });
        }
        
        // 检测碰撞
        function checkCollisions(player) {
            const characterRect = player.character.getBoundingClientRect();
            const gameAreaRect = player.gameArea.getBoundingClientRect();
            
            // 计算相对单位（基于游戏区域高度的1%）
            const relativeUnit = player.gameArea.offsetHeight * 0.01;
            const objectSize = relativeUnit * 3;
            
            player.objects.forEach((obj, index) => {
                const objRect = obj.element.getBoundingClientRect();
                
                // 检查是否碰撞到角色头部
                if (obj.y + objectSize >= characterRect.top - gameAreaRect.top &&
                    obj.x + objectSize >= characterRect.left - gameAreaRect.left &&
                    obj.x <= characterRect.right - gameAreaRect.left) {
                    
                    // 处理碰撞
                    handleCollision(player, obj);
                    
                    // 移除物体
                    player.gameArea.removeChild(obj.element);
                    player.objects.splice(index, 1);
                    
                    // 检查是否需要生成下一个物体
                    checkAndSpawnNextObject(player);
                }
            });
        }
        
        // 处理碰撞
        function handleCollision(player, obj) {
            let message = "";
            console.log("碰撞检测 - 玩家:", player.id, "物体类型:", obj.type, "当前动作:", currentAction);
            
            // 确保character元素存在
            if (!player.character) {
                console.error("character元素不存在");
                return;
            }
            
            if (obj.type === 'gold') {
                // 金元宝 + 双手举起
                if (currentAction === "举起双手") {
                    message = "赞";
                    console.log("显示弹幕: 赞");
                    console.log("切换到开心表情");
                    // 改变为开心的表情
                    if (player.expressionImage) {
                        player.expressionImage.src = expressions.happy;
                        player.character.style.backgroundColor = "transparent";
                    }
                } else {
                    console.log("金元宝落下但动作不是举起双手，不显示弹幕");
                }
            } else {
                // 石头 + 双手抱头
                if (currentAction === "双手抱头") {
                    message = "你真棒";
                    console.log("显示弹幕: 你真棒");
                    console.log("切换到得意表情");
                    // 改变为得意的表情
                    if (player.expressionImage) {
                        player.expressionImage.src = expressions.proud;
                        player.character.style.backgroundColor = "transparent";
                    }
                } else {
                    message = "好痛啊";
                    console.log("显示弹幕: 好痛啊");
                    console.log("切换到哭的表情");
                    // 改变为哭的表情，带眼泪
                    if (player.expressionImage) {
                        player.expressionImage.src = expressions.crying;
                        player.character.style.backgroundColor = "transparent";
                    }
                }
            }
            
            // 显示弹幕
            if (message) {
                showMessage(player, message);
            }
            
            // 2秒后恢复默认表情
            setTimeout(() => {
                console.log("恢复默认表情");
                if (player.expressionImage) {
                    player.expressionImage.src = expressions.default;
                    player.character.style.backgroundColor = "transparent";
                }
            }, 2000);
        }
        
        // 显示弹幕
        function showMessage(player, message) {
            const characterRect = player.character.getBoundingClientRect();
            const gameAreaRect = player.gameArea.getBoundingClientRect();
            
            const messageElement = document.createElement('div');
            messageElement.className = '弹幕';
            messageElement.textContent = message;
            messageElement.style.left = `${characterRect.left - gameAreaRect.left + characterRect.width / 2}px`;
            messageElement.style.top = `${characterRect.top - gameAreaRect.top - 50}px`;
            messageElement.style.transform = 'translateX(-50%)';
            
            player.gameArea.appendChild(messageElement);
            
            // 2秒后移除弹幕
            setTimeout(() => {
                if (messageElement.parentNode) {
                    messageElement.parentNode.removeChild(messageElement);
                }
            }, 2000);
        }
        
        // 初始化游戏
        initGame();
    </script>
</body>
</html>
